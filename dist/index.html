<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMS Web</title>
  <script type="module" crossorigin src="/assets/index-IPv7xaV8.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BXEHEwd_.css">
</head>

<body>
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="mb-3 mt-3">
                    <h2 class="mb-3" style="font-weight: 300">SIMS Web</h2>

                    <!-- Model Selection -->
                    <div class="mb-3">
                        <label for="model_select" class="form-label">Select a model:</label>
                        <select class="form-select" id="model_select">
                            <option value="">Loading...</option>
                        </select>
                    </div>

                    <!-- File Upload -->
                    <div class="mb-3">
                        <label for="file_input" class="form-label">Select an AnnData/Scanpy (.h5ad) file</label>
                        <input type="file" class="form-control" name="file_input" id="file_input" accept=".h5ad">
                    </div>

                    <!-- Cell Range Slider -->
                    <div class="mb-3">
                        <label for="cellRange" class="form-label">% Of Cells To Process:</label>
                        <input type="range" class="form-range" id="cellRange" min="0" max="100" step="1" value="1">
                        <small id="cellRangeValue" class="form-text text-muted">1%</small>
                    </div>

                    <!-- Buttons -->
                    <button id="predict_btn" class="btn btn-primary" autofocus>Predict</button>
                    <button id="stop_btn" class="btn btn-danger">Stop</button>
                </div>

                <!-- Progress Bar -->
                <div class="progress">
                    <div id="progress-bar" class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0"
                        aria-valuemax="100"></div>
                </div>
                <div id="elapsed-time"></div>
                <div id="results"></div>
            </div>
        </div>
    </div>
</body>

</html>
